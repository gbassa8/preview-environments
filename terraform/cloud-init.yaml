#cloud-config
hostname: athenea
package_update: true

write_files:
  - path: /var/lib/rancher/k3s/server/manifests/traefik-config.yaml
    permissions: "0644"
    content: |
      apiVersion: helm.cattle.io/v1
      kind: HelmChartConfig
      metadata:
        name: traefik
        namespace: kube-system
      spec:
        valuesContent: |-
          additionalArguments:
            - --providers.kubernetesingress.ingressendpoint.ip=${traefik_public_ip}
          providers:
            kubernetesIngress:
              publishedService:
                enabled: false

runcmd:
  - curl -fsSL https://tailscale.com/install.sh | sh
  - systemctl enable --now tailscaled
  - tailscale up --auth-key=${tailscale_auth_key}
  - curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server --tls-san athenea" sh -
