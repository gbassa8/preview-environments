apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-prueba
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-prueba
  template:
    metadata:
      labels:
        app: app-prueba
    spec:
      containers:
        - name: echo
          image: hashicorp/http-echo:1.0.0
          args:
            - "-text=funciona"
          ports:
            - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: app-prueba
  namespace: default
spec:
  selector:
    app: app-prueba
  ports:
    - port: 80
      targetPort: 5678
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-prueba
  namespace: default
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - app-prueba.preview.serviciosimpositivos.com.ar
      secretName: preview-wildcard-tls
  rules:
    - host: app-prueba.preview.serviciosimpositivos.com.ar
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-prueba
                port:
                  number: 80
