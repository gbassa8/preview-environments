apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-prueba
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/gbassa8/preview-environments.git
    targetRevision: HEAD
    path: gitops/services/app-prueba
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
